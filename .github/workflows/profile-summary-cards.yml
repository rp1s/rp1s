name: Generate profile cards

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: rp1s
          BRANCH_NAME: main
          UTC_OFFSET: 3
          EXCLUDE: ""
          AUTO_PUSH: true
